name: Build SharpSMBSpray

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # 列出仓库结构，方便调试
      - name: Show repository structure
        run: Get-ChildItem -Recurse -Include "*.sln","*.csproj" | Select-Object FullName

      # .sln 在子目录 SharpSMBSpray/ 下
      - name: Restore NuGet packages
        run: nuget restore SharpSMBSpray\SharpSMBSpray.sln

      - name: Build with MSBuild
        run: |
          msbuild SharpSMBSpray\SharpSMBSpray.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU"

      - name: List build output
        run: Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharpSMBSpray-Release
          path: |
            **/bin/Release/*.exe
            **/bin/Release/*.dll
          retention-days: 7