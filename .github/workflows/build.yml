name: Build SharpSMBSpray

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    # windows-2019 内置 .NET Framework 4.0/4.5/4.6/4.7/4.8 完整 targeting pack
    # 无需额外安装，直接支持 v4.0 项目
    runs-on: windows-2019

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        shell: powershell
        run: nuget restore SharpSMBSpray\SharpSMBSpray.sln

      - name: Build with MSBuild
        shell: powershell
        run: |
          msbuild SharpSMBSpray\SharpSMBSpray.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:TargetFrameworkVersion=v4.0

      - name: List build output
        shell: powershell
        run: Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharpSMBSpray-Release
          path: |
            **/bin/Release/*.exe
            **/bin/Release/*.dll
          retention-days: 7