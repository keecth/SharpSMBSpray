name: Build SharpSMBSpray

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # windows-latest 缺少 .NET 4.0 Targeting Pack，用 choco 补装
      - name: Install .NET Framework 4.0 Developer Pack
        shell: powershell
        run: choco install netfx-4.0.3-devpack -y --no-progress

      - name: Restore NuGet packages
        shell: powershell
        run: nuget restore SharpSMBSpray\SharpSMBSpray.sln

      - name: Build with MSBuild
        shell: powershell
        run: |
          msbuild SharpSMBSpray\SharpSMBSpray.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:TargetFrameworkVersion=v4.0

      - name: List build output
        shell: powershell
        run: Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharpSMBSpray-Release
          path: |
            **/bin/Release/*.exe
            **/bin/Release/*.dll
          retention-days: 7